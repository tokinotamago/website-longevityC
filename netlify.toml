[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://zipcloud.ibsnet.co.jp; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com blob: data:; img-src 'self' https://images.unsplash.com https://www.this.ne.jp data: blob:; connect-src 'self' https://*.supabase.co; frame-src https://www.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';"
